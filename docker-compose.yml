version: "3.9"
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: oms-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Password123"
      MSSQL_PID: "Developer"
    volumes:
      - oms-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-U", "sa", "-P", "YourStrong@Password123", "-Q", "SELECT 1"]
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - oms-network

volumes:
  oms-sqlserver-data:

networks:
  oms-network:
    driver: bridge