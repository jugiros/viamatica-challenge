<div class="min-h-screen bg-gray-100">
  <!-- Header -->
  <header class="bg-white shadow-md fixed top-0 left-0 right-0 z-50">
    <div class="flex items-center justify-between px-4 py-3">
      <div class="flex items-center space-x-4">
        <button 
          (click)="toggleSidebar()"
          class="p-2 rounded-lg hover:bg-gray-100 transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h1 class="text-xl font-bold text-gray-800">OMS - Sistema de Gestión de Órdenes</h1>
      </div>
      <div class="flex items-center space-x-4">
        <span class="text-sm text-gray-600">
          @if (currentUser()) {
            {{ currentUser()!.name }}
            @if (isAdmin()) {
              <span class="ml-2 px-2 py-1 bg-blue-100 text-blue-800 text-xs rounded">ADMIN</span>
            }
          }
        </span>
        <button 
          (click)="logout()"
          class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors"
        >
          Cerrar Sesión
        </button>
      </div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside 
    class="fixed top-16 left-0 h-full bg-white shadow-lg transition-transform duration-300 z-40"
    [class.-translate-x-full]="!isSidebarOpen()"
    [class.w-64]="isSidebarOpen()"
  >
    <nav class="p-4">
      <ul class="space-y-2">
        <li>
          <a 
            routerLink="/dashboard"
            routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center space-x-3 px-4 py-2 rounded-lg hover:bg-gray-100 transition-colors"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a 
            routerLink="/products"
            routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center space-x-3 px-4 py-2 rounded-lg hover:bg-gray-100 transition-colors"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
            <span>Productos</span>
          </a>
        </li>
        <li>
          <a 
            routerLink="/orders/new"
            routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center space-x-3 px-4 py-2 rounded-lg hover:bg-gray-100 transition-colors"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
            <span>Nueva Orden</span>
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content -->
  <main 
    class="pt-16 transition-all duration-300"
    [class.ml-64]="isSidebarOpen()"
    [class.ml-0]="!isSidebarOpen()"
  >
    <div class="p-6">
      <router-outlet />
    </div>
  </main>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-4 text-center text-sm text-gray-600">
    <p>&copy; 2024 OMS - Sistema de Gestión de Órdenes. Todos los derechos reservados.</p>
  </footer>
</div>
