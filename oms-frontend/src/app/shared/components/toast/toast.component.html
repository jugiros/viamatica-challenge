<div class="toast-container">
  @for (toast of toasts(); track toast.id) {
    <div class="toast toast-{{ toast.type }}">
      <div class="toast-icon" [style.color]="getIconColor(toast.type)">
        {{ getIcon(toast.type) }}
      </div>
      <div class="toast-message">
        {{ toast.message }}
      </div>
      <button 
        class="toast-close" 
        (click)="remove(toast.id)"
        aria-label="Cerrar"
      >
        ✕
      </button>
    </div>
  }
</div>
