<div class="payment-form">
  <h2>Procesar Pago</h2>
  
  @if (successMessage()) {
    <div class="alert alert-success">
      {{ successMessage() }}
    </div>
  }
  
  @if (errorMessage()) {
    <div class="alert alert-danger">
      {{ errorMessage() }}
    </div>
  }
  
  @if (isLoading()) {
    <div class="loading">Procesando pago...</div>
  } @else {
    <form (ngSubmit)="processPayment()">
      <div class="form-group">
        <label for="orderId">ID de Orden:</label>
        <input type="number" id="orderId" [(ngModel)]="paymentRequest().orderId" name="orderId" [disabled]="true">
      </div>
      
      <div class="form-group">
        <label for="method">Método de Pago:</label>
        <select id="method" [(ngModel)]="paymentRequest().method" name="method">
          <option value="CREDIT_CARD">Tarjeta de Crédito</option>
          <option value="DEBIT_CARD">Tarjeta de Débito</option>
          <option value="PAYPAL">PayPal</option>
          <option value="TRANSFER">Transferencia Bancaria</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="amount">Monto:</label>
        <input type="number" id="amount" [(ngModel)]="paymentRequest().amount" name="amount" step="0.01" min="0" placeholder="0.00" required>
      </div>
      
      <div class="form-group">
        <label for="externalReference">Referencia Externa:</label>
        <input type="text" id="externalReference" [(ngModel)]="paymentRequest().externalReference" name="externalReference" placeholder="Referencia de transacción">
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="isLoading()">Procesar Pago</button>
        <button type="button" class="btn btn-secondary" (click)="cancel()">Cancelar</button>
      </div>
    </form>
  }
</div>
