<div class="user-form">
  <h2>@if (userId()) { Editar Usuario } @else { Crear Usuario }</h2>
  
  @if (successMessage()) {
    <div class="alert alert-success">
      {{ successMessage() }}
    </div>
  }
  
  @if (errorMessage()) {
    <div class="alert alert-danger">
      {{ errorMessage() }}
    </div>
  }
  
  @if (isLoading()) {
    <div class="loading">Guardando usuario...</div>
  } @else {
    <form (ngSubmit)="saveUser()">
      <div class="form-group">
        <label for="name">Nombre:</label>
        <input type="text" id="name" [(ngModel)]="userRequest().name" name="name" placeholder="Nombre completo" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" [(ngModel)]="userRequest().email" name="email" placeholder="correo@ejemplo.com" required>
      </div>
      
      <div class="form-group">
        <label for="role">Rol:</label>
        <select id="role" [(ngModel)]="userRequest().role" name="role">
          <option value="USER">Usuario</option>
          <option value="ADMIN">Administrador</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>
          <input type="checkbox" [(ngModel)]="userRequest().active" name="active">
          Activo
        </label>
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="isLoading()">Guardar</button>
        <button type="button" class="btn btn-secondary" (click)="cancel()">Cancelar</button>
      </div>
    </form>
  }
</div>
