<div class="audit-list">
  <div class="header">
    <h2>Logs de Auditoría</h2>
  </div>
  
  @if (errorMessage()) {
    <div class="alert alert-danger">
      {{ errorMessage() }}
    </div>
  }
  
  <div class="filters">
    <form (ngSubmit)="applyFilters()">
      <div class="form-group">
        <label for="userId">ID Usuario:</label>
        <input type="number" id="userId" [(ngModel)]="filters().userId" name="userId" placeholder="ID Usuario">
      </div>
      
      <div class="form-group">
        <label for="table">Tabla:</label>
        <input type="text" id="table" [(ngModel)]="filters().table" name="table" placeholder="Nombre de tabla">
      </div>
      
      <div class="form-group">
        <label for="operation">Operación:</label>
        <input type="text" id="operation" [(ngModel)]="filters().operation" name="operation" placeholder="INSERT, UPDATE, DELETE">
      </div>
      
      <div class="form-group">
        <label for="fechaDesde">Fecha Desde:</label>
        <input type="date" id="fechaDesde" [(ngModel)]="filters().fechaDesde" name="fechaDesde">
      </div>
      
      <div class="form-group">
        <label for="fechaHasta">Fecha Hasta:</label>
        <input type="date" id="fechaHasta" [(ngModel)]="filters().fechaHasta" name="fechaHasta">
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Filtrar</button>
        <button type="button" class="btn btn-secondary" (click)="clearFilters()">Limpiar</button>
      </div>
    </form>
  </div>
  
  @if (isLoading()) {
    <div class="loading-skeleton">
      <div class="skeleton-item"></div>
      <div class="skeleton-item"></div>
      <div class="skeleton-item"></div>
    </div>
  } @else {
    @if (!auditLogs() || auditLogs().length === 0) {
      <div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <h3>No hay logs de auditoría</h3>
        <p>Aplique filtros para buscar registros de auditoría</p>
      </div>
    } @else {
      <div class="audit-content">
        <pre>{{ auditLogs() }}</pre>
      </div>
    }
  }
</div>
